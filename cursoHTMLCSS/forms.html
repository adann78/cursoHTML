<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>
    <form>
        <input type="text" name="nombre" placeholder="Nombre" required minlength="3"> 
            <input type="password" name="contraseña" placeholder="Contraseña" required>
            <input type="email" name="email" placeholder="Correo electrónico" required>
            <input type="tel" name="telefono" placeholder="Teléfono">
                <input type="url" name="website" placeholder="Sitio web">
        <input type="color">
         <input type="file">
            <input type="date">
             <input type="email">
                <input type="number">
                 <input type="password">
                <input type="radio" name="opcion" value="1"> Opción 1
                <input type="radio" name="opcion" value="2"> Opción 2
                 <input type="checkbox" name="check1"> Check 1
                 <input type="checkbox" name="check2"> Check 2
                    <textarea placeholder="Escribe tu mensaje"></textarea>
                     <select>
                         <option value="">Selecciona una opción</option>
                         <option value="opcion1">Opción 1</option>
                         <option value="opcion2">Opción 2</option>
                     </select>
                    <button type="submit">Enviar</button>
    </form>
</body>
</html>
